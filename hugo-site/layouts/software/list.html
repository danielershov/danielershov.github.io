{{ define "main" }}
<section class="page-shell prose">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ if .Pages }}
    <ul class="compact-list">
      {{ range .Pages.ByDate.Reverse }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  {{ end }}
</section>
{{ end }}
